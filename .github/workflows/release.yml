name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to release, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  THORVG_REF: 183f863c7e7cb5094c69677b2f9e5f3fc9c3aece

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/workflows/release.yml

      - name: Cache OBS dependencies
        uses: actions/cache@v4
        with:
          path: .deps
          key: macos-release-deps-${{ hashFiles('buildspec.json', 'cmake/common/buildspec_common.cmake', 'cmake/macos/buildspec.cmake') }}

      - name: Cache ThorVG build products
        uses: actions/cache@v4
        with:
          path: |
            vendor/thorvg-install
            vendor/thorvg/builddir-arm64
            vendor/thorvg/builddir-x86_64
          key: macos-thorvg-${{ env.THORVG_REF }}-${{ hashFiles('cmake/build-thorvg.sh') }}

      - name: Install ThorVG build tools
        run: python3 -m pip install meson ninja

      - name: Fetch pinned ThorVG source
        run: |
          git init vendor/thorvg
          git -C vendor/thorvg remote add origin https://github.com/thorvg/thorvg.git || true
          git -C vendor/thorvg fetch --depth 1 origin "${THORVG_REF}"
          git -C vendor/thorvg checkout --detach FETCH_HEAD

      - name: Verify tag matches buildspec version
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          tag = os.environ["RELEASE_TAG"]
          version = json.load(open("buildspec.json", "r", encoding="utf-8"))["version"]
          expected = f"v{version}"
          if tag != expected:
              print(f"Tag/version mismatch: tag={tag} buildspec={expected}", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Configure macOS build
        run: cmake --preset macos

      - name: Build macOS plugin
        run: cmake --build --preset macos --target obs-lottie-transition

      - name: Package macOS plugin bundle
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          ASSET="obs-lottie-transition-${VERSION}-macos-universal.zip"
          ditto -c -k --sequesterRsrc --keepParent \
            build_macos/RelWithDebInfo/obs-lottie-transition.plugin \
            "${ASSET}"

      - name: Upload macOS release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: obs-lottie-transition-*-macos-universal.zip
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/workflows/release.yml

      - name: Cache OBS dependencies
        uses: actions/cache@v4
        with:
          path: .deps
          key: windows-release-deps-${{ hashFiles('buildspec.json', 'cmake/common/buildspec_common.cmake', 'cmake/windows/buildspec.cmake') }}

      - name: Cache ThorVG build products
        uses: actions/cache@v4
        with:
          path: |
            vendor/thorvg-install
            vendor/thorvg/builddir
          key: windows-thorvg-v2-${{ env.THORVG_REF }}-${{ hashFiles('cmake/build-thorvg.sh', '.github/workflows/release.yml') }}

      - name: Install ThorVG build tools
        run: python -m pip install meson ninja

      - name: Prime ThorVG cache variables
        shell: pwsh
        run: |
          "MESON_BIN=$(python -c "import shutil; print(shutil.which('meson') or '')")" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "NINJA_BIN=$(python -c "import shutil; print(shutil.which('ninja') or '')")" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Fetch pinned ThorVG source
        shell: pwsh
        run: |
          git init vendor/thorvg
          try { git -C vendor/thorvg remote add origin https://github.com/thorvg/thorvg.git } catch {}
          git -C vendor/thorvg fetch --depth 1 origin "${env:THORVG_REF}"
          git -C vendor/thorvg checkout --detach FETCH_HEAD

      - name: Verify tag matches buildspec version
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          $version = (Get-Content buildspec.json | ConvertFrom-Json).version
          $expected = "v$version"
          if ($env:RELEASE_TAG -ne $expected) {
            throw "Tag/version mismatch: tag=$($env:RELEASE_TAG) buildspec=$expected"
          }

      - name: Configure Windows build
        run: cmake --preset windows-x64

      - name: Build vendored ThorVG
        shell: pwsh
        env:
          CC: cl
          CXX: cl
        run: |
          $meson = $env:MESON_BIN
          $ninja = $env:NINJA_BIN
          if (-not $meson) { throw "MESON_BIN not set" }
          if (-not $ninja) { throw "NINJA_BIN not set" }

          $src = Join-Path $PWD "vendor/thorvg"
          $build = Join-Path $PWD "vendor/thorvg/builddir"
          $prefix = Join-Path $PWD "vendor/thorvg-install"

          if (Test-Path $build) {
            & $meson setup --vsenv --wipe $build $src `
              --prefix $prefix `
              -Ddefault_library=static `
              -Dengines=sw `
              -Dloaders=lottie `
              -Dextra= `
              -Dtools= `
              -Dsavers= `
              -Dbindings=capi `
              -Dtests=false `
              -Dfile=true
          } else {
            & $meson setup --vsenv $build $src `
              --prefix $prefix `
              -Ddefault_library=static `
              -Dengines=sw `
              -Dloaders=lottie `
              -Dextra= `
              -Dtools= `
              -Dsavers= `
              -Dbindings=capi `
              -Dtests=false `
              -Dfile=true
          }

          if ($LASTEXITCODE -ne 0) { throw "Meson setup failed" }
          & $ninja -C $build install
          if ($LASTEXITCODE -ne 0) { throw "Ninja install failed" }

      - name: Build Windows plugin
        run: cmake --build --preset windows-x64 --target obs-lottie-transition

      - name: Package Windows plugin
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          $version = $env:RELEASE_TAG.Substring(1)
          $asset = "obs-lottie-transition-$version-windows-x64.zip"
          $stage = Join-Path $PWD "stage/windows/obs-lottie-transition"
          $binDir = Join-Path $stage "bin/64bit"
          New-Item -ItemType Directory -Force -Path $binDir | Out-Null
          $dll = Get-ChildItem -Path build_x64 -Recurse -Filter obs-lottie-transition.dll | Select-Object -First 1
          if (-not $dll) { throw "obs-lottie-transition.dll not found" }
          Copy-Item $dll.FullName $binDir
          $pdb = Get-ChildItem -Path build_x64 -Recurse -Filter obs-lottie-transition.pdb | Select-Object -First 1
          if ($pdb) { Copy-Item $pdb.FullName $binDir }
          Copy-Item data (Join-Path $stage "data") -Recurse
          if (Test-Path $asset) { Remove-Item $asset -Force }
          Compress-Archive -Path $stage -DestinationPath $asset

      - name: Upload Windows release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: obs-lottie-transition-*-windows-x64.zip
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/workflows/release.yml

      - name: Cache ThorVG build products
        uses: actions/cache@v4
        with:
          path: |
            vendor/thorvg-install
            vendor/thorvg/builddir
          key: linux-thorvg-${{ env.THORVG_REF }}-${{ hashFiles('cmake/build-thorvg.sh') }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:obsproject/obs-studio
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libobs-dev \
            libsimde-dev

      - name: Install ThorVG build tools
        run: python3 -m pip install meson ninja

      - name: Fetch pinned ThorVG source
        run: |
          git init vendor/thorvg
          git -C vendor/thorvg remote add origin https://github.com/thorvg/thorvg.git || true
          git -C vendor/thorvg fetch --depth 1 origin "${THORVG_REF}"
          git -C vendor/thorvg checkout --detach FETCH_HEAD

      - name: Verify tag matches buildspec version
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          tag = os.environ["RELEASE_TAG"]
          version = json.load(open("buildspec.json", "r", encoding="utf-8"))["version"]
          expected = f"v{version}"
          if tag != expected:
              print(f"Tag/version mismatch: tag={tag} buildspec={expected}", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Configure Linux build
        run: cmake --preset ubuntu-x86_64

      - name: Build Linux plugin
        run: cmake --build --preset ubuntu-x86_64 --target obs-lottie-transition

      - name: Package Linux plugin
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          ASSET="obs-lottie-transition-${VERSION}-linux-x86_64.tar.gz"
          STAGE="stage/linux/obs-lottie-transition"
          BIN_DIR="${STAGE}/bin/64bit"
          mkdir -p "${BIN_DIR}"
          SO_PATH="$(find build_x86_64 -path '*/rundir/*/obs-lottie-transition.so' -print -quit)"
          if [ -z "${SO_PATH}" ]; then
            echo "obs-lottie-transition.so not found" >&2
            exit 1
          fi
          cp "${SO_PATH}" "${BIN_DIR}/"
          cp -R data "${STAGE}/data"
          tar -C stage/linux -czf "${ASSET}" obs-lottie-transition

      - name: Upload Linux release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: obs-lottie-transition-*-linux-x86_64.tar.gz
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
      - build-linux

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/**/*.zip
            release-assets/**/*.tar.gz

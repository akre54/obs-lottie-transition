name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to release, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  macos-release:
    runs-on: macos-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install ThorVG build tools
        run: python3 -m pip install --user meson ninja

      - name: Fetch pinned ThorVG source
        run: |
          git init vendor/thorvg
          git -C vendor/thorvg remote add origin https://github.com/thorvg/thorvg.git
          git -C vendor/thorvg fetch --depth 1 origin 183f863c7e7cb5094c69677b2f9e5f3fc9c3aece
          git -C vendor/thorvg checkout --detach FETCH_HEAD

      - name: Verify tag matches buildspec version
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          tag = os.environ["RELEASE_TAG"]
          version = json.load(open("buildspec.json", "r", encoding="utf-8"))["version"]
          expected = f"v{version}"
          if tag != expected:
              print(f"Tag/version mismatch: tag={tag} buildspec={expected}", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Configure macOS build
        run: cmake --preset macos

      - name: Build macOS plugin
        run: cmake --build --preset macos

      - name: Package macOS plugin bundle
        id: package
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          ASSET="obs-lottie-transition-${VERSION}-macos-universal.zip"
          ditto -c -k --sequesterRsrc --keepParent \
            build_macos/RelWithDebInfo/obs-lottie-transition.plugin \
            "${ASSET}"
          echo "asset=${ASSET}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.package.outputs.asset }}

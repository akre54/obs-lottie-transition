name: Tests

on:
  push:
  pull_request:

jobs:
  harness:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure tests
        run: cmake --preset tests

      - name: Build tests
        run: cmake --build --preset tests

      - name: Run tests
        run: ctest --preset tests
